<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — GITAM Food Hub Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;
      background:linear-gradient(135deg,#fff5f0 0%,#fff 60%,#f5f0ff 100%);}

    /* Floating food */
    .food-float{position:absolute;font-size:2.8rem;animation:float 5s ease-in-out infinite;opacity:.7;z-index:0;pointer-events:none;}
    .f1{top:12%;left:8%;animation-delay:0s;}
    .f2{top:55%;right:6%;animation-delay:1s;}
    .f3{bottom:15%;left:18%;animation-delay:1.8s;font-size:3.5rem;}
    .f4{top:18%;right:12%;animation-delay:.6s;}
    .f5{bottom:30%;right:22%;animation-delay:2.2s;font-size:2rem;}
    @keyframes float{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-18px) rotate(6deg);}}

    /* Card */
    .auth-card{background:#fff;width:100%;max-width:420px;padding:40px 36px;border-radius:24px;
      box-shadow:0 24px 60px rgba(0,0,0,.10);position:relative;z-index:10;}
    .brand-row{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
    .brand-ico{font-size:2rem;}
    .brand-name{font-size:1.35rem;font-weight:800;color:#1c1c1c;}
    .brand-name span{color:#ff4500;}
    .auth-title{font-size:1.7rem;font-weight:800;margin-bottom:4px;}
    .auth-sub{color:#6b7280;font-size:.92rem;margin-bottom:28px;}

    /* Steps */
    .step{display:none;} .step.active{display:block;}

    /* Fields */
    .fld-group{margin-bottom:18px;}
    .fld-group label{display:block;font-weight:600;font-size:.85rem;color:#374151;margin-bottom:6px;}
    .fld-row{display:flex;align-items:center;border:1.5px solid #e5e7eb;border-radius:10px;
      background:#fafafa;overflow:hidden;transition:border-color .25s;}
    .fld-row:focus-within{border-color:#ff4500;background:#fff;}
    .fld-prefix{padding:14px 12px;font-weight:700;color:#6b7280;border-right:1.5px solid #e5e7eb;background:#fff;font-size:.95rem;}
    .fld-row input{flex:1;padding:14px 12px;border:none;outline:none;background:transparent;font-size:1rem;color:#1c1c1c;}
    .fld-row input::placeholder{color:#9ca3af;}

    /* Buttons */
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
      padding:14px;border-radius:50px;font-weight:700;font-size:1rem;border:none;cursor:pointer;transition:all .2s;}
    .btn:active{transform:scale(.97);}
    .btn:disabled{opacity:.6;cursor:not-allowed;}
    .btn-primary{background:#ff4500;color:#fff;box-shadow:0 6px 20px rgba(255,69,0,.28);}
    .btn-primary:hover{background:#e03e00;}
    .btn-success{background:#10b981;color:#fff;box-shadow:0 6px 20px rgba(16,185,129,.25);}
    .btn-success:hover{background:#059669;}
    .btn-google{background:#fff;color:#374151;border:1.5px solid #e5e7eb;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .btn-google:hover{background:#f9fafb;border-color:#d1d5db;}
    .btn-outline{background:transparent;border:1.5px solid #e5e7eb;color:#374151;}

    /* Divider */
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#9ca3af;font-size:.85rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb;}

    /* OTP Input */
    #login-otp{text-align:center;letter-spacing:8px;font-weight:800;font-size:1.3rem;}

    /* Hint */
    .hint{margin-top:18px;font-size:.82rem;color:#9ca3af;text-align:center;}
    .hint a{color:#ff4500;font-weight:600;cursor:pointer;}

    /* Recaptcha hidden */
    #recaptcha{margin-bottom:16px;}

    /* Username Modal Overlay */
    #username-modal{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.5);
      backdrop-filter:blur(4px);align-items:center;justify-content:center;}
    #username-modal.show{display:flex;}
    .uname-card{background:#fff;width:90%;max-width:380px;padding:36px 32px;border-radius:20px;
      box-shadow:0 16px 50px rgba(0,0,0,.15);animation:popIn .3s ease;}
    @keyframes popIn{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
    .uname-card h3{font-size:1.4rem;font-weight:800;margin-bottom:6px;}
    .uname-card p{color:#6b7280;font-size:.9rem;margin-bottom:24px;}

    /* Toast */
    #auth-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
      background:#1c1c1c;color:#fff;padding:12px 24px;border-radius:50px;font-size:.9rem;font-weight:600;
      transition:transform .3s ease;z-index:9999;white-space:nowrap;}
    #auth-toast.show{transform:translateX(-50%) translateY(0);}
    
    @media(max-width:480px){.auth-card{padding:32px 24px;border-radius:0;min-height:100vh;display:flex;flex-direction:column;justify-content:center;}}
  </style>
</head>
<body>

  <div class="food-float f1">🍕</div>
  <div class="food-float f2">🍔</div>
  <div class="food-float f3">🍜</div>
  <div class="food-float f4">🍟</div>
  <div class="food-float f5">🧃</div>

  <div class="auth-card">
    <div class="brand-row">
      <div class="brand-ico">🍔</div>
      <div class="brand-name">GITAM<span>Hub</span></div>
    </div>

    <h2 class="auth-title">Welcome Back!</h2>
    <p class="auth-sub">Login to order food & track deliveries</p>

    <!-- Step 1: Phone Number -->
    <div class="step active" id="step-phone">
      <div class="fld-group">
        <label>Phone Number</label>
        <div class="fld-row">
          <span class="fld-prefix">🇮🇳 +91</span>
          <input type="tel" id="login-phone" placeholder="10-digit mobile number" maxlength="10">
        </div>
      </div>
      <div id="recaptcha"></div>
      <button class="btn btn-primary" id="send-otp-btn" onclick="window.sendOTP()">
        📲 Send OTP
      </button>

      <div class="divider">or</div>

      <button class="btn btn-google" onclick="window.googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="Google">
        Continue with Google
      </button>

      <p class="hint">By continuing, you agree to our <a>Terms & Privacy Policy</a></p>
    </div>

    <!-- Step 2: OTP Verify -->
    <div class="step" id="step-otp">
      <p style="color:#6b7280;font-size:.9rem;margin-bottom:16px;" id="otp-sent-to"></p>
      <div class="fld-group">
        <label>Enter OTP</label>
        <div class="fld-row">
          <input type="text" id="login-otp" placeholder="• • • • • •" maxlength="6">
        </div>
      </div>
      <button class="btn btn-success" id="verify-otp-btn" onclick="window.verifyOTP()">
        ✅ Verify & Login
      </button>
      <p class="hint mt-sm">Didn't get OTP? <a onclick="window.resendOTP()">Resend</a></p>
    </div>
  </div>

  <!-- Username Onboarding Modal -->
  <div id="username-modal">
    <div class="uname-card">
      <h3>🙋 What's your name?</h3>
      <p>Help us personalize your experience</p>
      <div class="fld-group">
        <label>Your Name</label>
        <div class="fld-row">
          <input type="text" id="username-input" placeholder="e.g. Masthan Reddy" maxlength="30">
        </div>
      </div>
      <button class="btn btn-primary" onclick="window.saveUsername()">Continue 🚀</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="auth-toast"></div>

  <!-- Firebase CDN (compat) BEFORE auth.js -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
